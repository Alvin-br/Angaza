<!DOCTYPE html>
<html>
<head>
    <title>Maintenance in Progress</title>
    <style>
        body { text-align: center; padding: 150px; font-family: sans-serif; background-color: #f4f4f4; }
        h1 { font-size: 50px; color: #333; }
        p { font-size: 20px; color: #666; }
        .spinner { border: 4px solid rgba(0,0,0,.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #09f; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h1>We&rsquo;ll be back soon!</h1>
    <div>
        <p>We are currently undertaking scheduled maintenance to improve our services. We&rsquo;ll inform you once we are back online. Thanks for your patience!</p>
        <p>&mdash; The Team</p>
    </div>
</body>
</html>
